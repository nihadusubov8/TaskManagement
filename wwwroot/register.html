<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>SiNAM - Qeydiyyat</title>
</head>
<body>
    <div class="login-container">
        <img src="https://sinam.net/assets/logo-b2586676.png" alt="SiNAM Logo" class="logo">
        <h2>Yeni hesab yaradın</h2>
        <input type="email" id="email" placeholder="Email ünvanı">
        <input type="text" id="username" placeholder="İstifadəçi adı">
        <input type="password" id="password" placeholder="Şifrə">
        <button onclick="register()">Qeydiyyatdan keç</button>
        <p><a href="index.html" style="color: #0052cc;">Artıq hesabınız var? Daxil olun</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
