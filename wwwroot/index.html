<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>SiNAM - Giriş</title>
</head>
<body>
    <div class="login-container">
        <img src="https://sinam.net/assets/logo-b2586676.png" alt="SiNAM Logo" class="logo">
        <h2>Davam etmək üçün oturum açın</h2>
        <input type="text" id="username" placeholder="İstifadəçi adı">
        <input type="password" id="password" placeholder="Şifrə">
        <button onclick="login()">Daxil ol</button>
        <div class="divider">və ya</div>
        <button class="register-btn" onclick="window.location.href='register.html'">Qeydiyyatdan keç</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
