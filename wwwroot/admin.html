<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Admin Paneli</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f5f7; display: flex; justify-content: center; padding-top: 50px; }
        #panel-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        .task-item { border: 1px solid #eee; padding: 10px; margin-top: 10px; border-radius: 5px; text-align: left; }
        button { background-color: #d32f2f; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body onload="initPanel()">
    <div id="panel-container">
        <h2>Tapşırıqlar Siyahısı</h2>
        <div id="task-list">Yüklənir...</div>
        <button onclick="logout()">Çıxış</button>
    </div>

    <script src="script.js"></script>
    <script>
        function logout() { localStorage.removeItem('jwtToken'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
